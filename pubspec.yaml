name: pos_kamling
description: "Manajemen RT Digital."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  get: ^4.6.6
  supabase_flutter: ^2.12.2
  flutter_dotenv: ^5.1.0

  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  table_calendar: ^3.1.0

  intl: ^0.19.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  url_launcher: ^6.2.4
  share_plus: ^10.0.0
  path_provider: ^2.1.2
  uuid: ^4.3.3
  equatable: ^2.0.5

  cupertino_icons: ^1.0.6
  flutter_native_splash: ^2.4.7
  flutter_local_notifications: ^17.0.0
  flutter_secure_storage: ^9.2.2
  fancy_shimmer_image: ^2.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/

flutter_native_splash:
  color: "#c80062"
  image: assets/images/poskamling.png
  android: true
  ios: true
  web: true
